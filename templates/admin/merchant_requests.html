{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Merchant Requests</h2>

<table class="table table-bordered">

    <tr>

        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Business</th>
        <th>Status</th>
        <th>Action</th>

    </tr>

    {% for i in merchants %}

    <tr>

        <td>{{ i.id }}</td>
        <td>{{ i.name }}</td>
        <td>{{ i.email }}</td>
        <td>{{ i.business_name }}</td>
        <td>{{ i.status }}</td>

        <td>

            <a href="/approve/{{ i.id }}/"
            class="btn btn-success btn-sm">

                Approve

            </a>

            <a href="/reject/{{ i.id }}/"
            class="btn btn-danger btn-sm">

                Reject

            </a>

        </td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
