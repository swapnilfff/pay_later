{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-header bg-dark text-white">
                <h3>Admin Login</h3>
            </div>

            <div class="card-body">

                {% if messages %}

                    {% for message in messages %}

                        <div class="alert alert-danger">
                            {{ message }}
                        </div>

                    {% endfor %}

                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label>Username</label>

                        <input type="text"
                        name="username"
                        class="form-control"
                        required>

                    </div>

                    <div class="mb-3">

                        <label>Password</label>

                        <input type="password"
                        name="password"
                        class="form-control"
                        required>

                    </div>

                    <button type="submit"
                    class="btn btn-dark w-100">

                        Login

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
