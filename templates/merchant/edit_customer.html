{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-warning">
                <h3>Edit Customer</h3>
            </div>

            <div class="card-body">

                <form method="POST"
                enctype="multipart/form-data">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label>Customer Name</label>

                        <input type="text"
                        name="customer_name"
                        value="{{ customer.customer_name }}"
                        class="form-control"
                        required>

                    </div>

                    <div class="mb-3">

                        <label>Phone</label>

                        <input type="text"
                        name="phone"
                        value="{{ customer.phone }}"
                        class="form-control"
                        required>

                    </div>

                    <div class="mb-3">

                        <label>Notes</label>

                        <textarea name="notes"
                        class="form-control">{{ customer.notes }}</textarea>

                    </div>

                    <div class="mb-3">

                        <label>Current File</label>

                        <br>

                        {% if customer.file %}

                            <a href="{{ customer.file.url }}"
                            target="_blank">

                                View File

                            </a>

                        {% else %}

                            No File Uploaded

                        {% endif %}

                    </div>

                    <div class="mb-3">

                        <label>Update File</label>

                        <input type="file"
                        name="file"
                        class="form-control">

                    </div>

                    <button type="submit"
                    class="btn btn-success w-100">

                        Update Customer

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
