{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-success text-white">
                <h3>Add Payment</h3>
            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label>Amount</label>

                        <input type="number"
                        step="0.01"
                        name="amount"
                        class="form-control"
                        required>

                    </div>

                    <div class="mb-3">

                        <label>Note</label>

                        <textarea name="note"
                        class="form-control"></textarea>

                    </div>

                    <button type="submit"
                    class="btn btn-success w-100">

                        Add Payment

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
