{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between mb-3">

    <h2>Customers</h2>

    <a href="/add-customer/"
    class="btn btn-primary">

        Add Customer

    </a>

</div>

<form method="GET" class="mb-3">

    <input type="text"
    id="searchInput"
    class="form-control"
    placeholder="Search Customer">
</form>

<table class="table table-bordered"
id="customerTable">

    <tr>

        <th>ID</th>
        <th>Name</th>
        <th>Phone</th>
        <th>Notes</th>
        <th>File</th>
        <th>Action</th>

    </tr>

    {% for i in customers %}

    <tr>

        <td>{{ i.id }}</td>

        <td>{{ i.customer_name }}</td>

        <td>{{ i.phone }}</td>

        <td>{{ i.notes }}</td>

        <td>

            {% if i.file %}

                <a href="{{ i.file.url }}"
                target="_blank">

                    View File

                </a>

            {% else %}

                No File

            {% endif %}

        </td>

        <td>

              <a href="/ledger/{{ i.id }}/"
                class="btn btn-info btn-sm">

                Ledger

            </a>

            <a href="/edit-customer/{{ i.id }}/"
            class="btn btn-warning btn-sm">

                Edit

            </a>

            <a href="/delete-customer/{{ i.id }}/"
            class="btn btn-danger btn-sm">

                Delete

            </a>

          

        </td>

    </tr>

    {% endfor %}

</table>


<script>

document.getElementById(
'searchInput'

).addEventListener('keyup',

function(){

    let keyword = this.value

    fetch(`/search-customer/?keyword=${keyword}`)

    .then(response => response.json())

    .then(data => {

        let table = `

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Action</th>

        </tr>

        `

        data.forEach(customer => {

            table += `

            <tr>

                <td>${customer.id}</td>

                <td>${customer.name}</td>

                <td>${customer.phone}</td>

                <td>

                    <a href="/ledger/${customer.id}/"
                    class="btn btn-info btn-sm">

                        Ledger

                    </a>

                </td>

            </tr>

            `
        })

        document.getElementById(
        'customerTable'

        ).innerHTML = table

    })

})

</script>
{% endblock %}
